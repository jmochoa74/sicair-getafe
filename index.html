// ── lógica ────────────────────────────────────────────────────────
function detectPlateaus(sour, thresh=0.04, win=3) {
  const n = sour.length;
  if (n < win + 2) return [];
  const pv = Math.max(...sour);
  if (pv <= 0) return [];
  const pi = sour.indexOf(pv);
  const sm = sour.map((_, i) => {
    const sl = sour.slice(Math.max(0, i-1), i+2);
    return sl.reduce((a,b) => a+b, 0) / sl.length;
  });
  const res = [];
  let i = pi + 2;
  while (i < n - win + 1) {
    const slopes = [];
    for (let j = i; j < i + win - 1; j++) slopes.push(Math.abs((sm[j] - sm[j-1]) / pv));
    if (slopes.every(s => s < thresh)) {
      let e = i + win - 1;
      while (e + 1 < n && Math.abs((sm[e+1] - sm[e]) / pv) < thresh) e++;
      const vals = sour.slice(i, e+1);
      res.push({ startIdx: i, endIdx: e, mean: +(vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2) });
      i = e + 2;
    } else i++;
  }
  return res;
}

function classifyFractions(pl, pv) {
  if (!pl.length) return "fallo_sn8";
  if (pl.length >= 2) return "doble";
  return pl[0].mean / pv < 0.35 ? "endogena" : "xs_activa";
}

function processCiclo(c) {
  const sours = c.m.map(m => m[2]);
  const pv = Math.max(...sours);
  const valido = c.v === 1;
  const pl = valido ? detectPlateaus(sours) : [];
  return { raw:c, sours, peakVal:pv, plateaus:pl, tipo: valido ? classifyFractions(pl, pv) : "fallo_sn8", sobH:c.sh||0, valido };
}

function TabLaboratorio({ procs }) {

  const [clickF, setClickF] = useState(null);
  const val = procs.filter(p => p.valido);

  const avgF = arr => { const v=arr.filter(x=>x!=null&&x>0); return v.length?+(v.reduce((a,b)=>a+b)/v.length).toFixed(1):null; };

  // ── datos base ──────────────────────────────────────────────────
  const lab = RAW_LAB.filter(r => r.hct_sbr || r.kg_dqo || r.sst_sbr);
  const labRec = lab.slice(0,1)[0] || {};   // más reciente

  const hct_vals  = lab.map(r=>r.hct_sbr).filter(v=>v&&v>5);
  const nh4_vals  = lab.map(r=>r.nh4_sbr).filter(Boolean);
  const kg_vals   = lab.map(r=>r.kg_dqo).filter(Boolean);
  const sst_vals  = lab.map(r=>r.sst_sbr).filter(Boolean);
  const ssv_vals  = lab.map(r=>r.ssv_sbr).filter(Boolean);
  const esp_days  = lab.filter(r=>r.espumas===1).length;

  // ── semáforo: último registro disponible ────────────────────────
  // buscar el más reciente con cada dato
  const lastHct  = lab.find(r=>r.hct_sbr)?.hct_sbr;
  const lastNh4  = lab.find(r=>r.nh4_sbr)?.nh4_sbr;
  const lastKg   = lab.find(r=>r.kg_dqo)?.kg_dqo;
  const lastEsp  = lab.find(r=>r.espumas!=null)?.espumas;
  const lastDate = lab[0]?.f;

  function semColor(val, umbrales) {  // umbrales = [verde_max, amarillo_max]
    if (val == null) return S.muted;
    return val <= umbrales[0] ? S.green : val <= umbrales[1] ? S.amber : S.red;
  }
  function semLabel(val, umbrales) {
    if (val == null) return "Sin dato";
    return val <= umbrales[0] ? "Normal" : val <= umbrales[1] ? "Atención" : "Crítico";
  }

  const semaforos = [
    { label:"HCT reactor",  val:lastHct,  unit:"mg/l",    umb:[60,100],  icon:"🛢",
      desc:"<60 normal · 60-100 vigilar · >100 posible inhibición biológica" },
    { label:"NH₄ reactor",  val:lastNh4,  unit:"ppm",     umb:[50,150],  icon:"⚗",
      desc:"<50 nitrificación activa · >150 riesgo de inhibición" },
    { label:"Kg DQO/día",   val:lastKg,   unit:"kg",      umb:[250,400], icon:"⚖",
      desc:"<250 carga baja · 250-400 normal · >400 sobrecarga" },
    { label:"Espumas",      val:lastEsp,  unit:"",        umb:[0,0],     icon:"🫧",
      isFlag:true,
      desc:"Presencia de espumas indica tensioactivos o fango filamentoso" },
  ];

  // ── serie mensual ────────────────────────────────────────────────
  const byMes = {};
  lab.forEach(r => {
    const m = r.f.slice(0,7);
    if (!byMes[m]) byMes[m]={m,hct:[],nh4:[],kg:[],sst:[],ssv:[],fm:[],esp:0,n:0};
    if (r.hct_sbr&&r.hct_sbr>5) byMes[m].hct.push(r.hct_sbr);
    if (r.nh4_sbr) byMes[m].nh4.push(r.nh4_sbr);
    if (r.kg_dqo)  byMes[m].kg.push(r.kg_dqo);
    if (r.sst_sbr) byMes[m].sst.push(r.sst_sbr);
    if (r.ssv_sbr) byMes[m].ssv.push(r.ssv_sbr);
    if (r.fm)      byMes[m].fm.push(r.fm);
    if (r.espumas===1) byMes[m].esp++;
    byMes[m].n++;
  });
  const mesArr = Object.values(byMes).sort((a,b)=>a.m.localeCompare(b.m)).map(m=>({
    mes: m.m.slice(5),
    hct: avg(m.hct), nh4: avg(m.nh4), kg: avg(m.kg),
    sst: avg(m.sst), ssv: avg(m.ssv),
    fm: m.fm.length ? +(m.fm.reduce((a,b)=>a+b)/m.fm.length).toFixed(3) : null,
    esp: m.esp,
  }));

  // ── scatter Lab×SN8 con régimen ─────────────────────────────────
  const REG = {
    V25:{l:"Verano 2025",   c:"#e07b1a"},
    O25:{l:"Otoño 2025",    c:"#7c4daa"},
    I26:{l:"Invierno 2026", c:"#2c6fad"},
    P26:{l:"Primavera 2026",c:"#1a8fa0"},
  };
  const LAB_VARS = [
    {k:"kg_dqo",   l:"Kg DQO/día"},
    {k:"hct_sbr",  l:"HCT SBR"},
    {k:"nh4_sbr",  l:"NH₄ SBR"},
    {k:"dqo_homo", l:"DQO Homo"},
    {k:"hct_homo", l:"HCT Homo"},
    {k:"hct_dest", l:"HCT Destilado"},
    {k:"nh4_vert", l:"NH₄ Vertido"},
  ];
  const RESP_VARS = [
    {k:"sour_pk",l:"SOUR pico"},

    {k:"sh",     l:"h sobreaireo/día"},
  ];

  const scatterPts = RAW_PARES.filter(r=>r[ejeX]!=null&&r[ejeX]>0&&r[ejeY]!=null);

  function pearsonPares(xk,yk,reg=null) {
    const pts = RAW_PARES.filter(r=>(!reg||r.reg===reg)&&r[xk]!=null&&r[xk]>0&&r[yk]!=null);
    if (pts.length<4) return {r:null,n:pts.length};
    const xs=pts.map(r=>r[xk]),ys=pts.map(r=>r[yk]);
    const mx=xs.reduce((a,b)=>a+b)/xs.length,my=ys.reduce((a,b)=>a+b)/ys.length;
    const num=xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
    const den=Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0)*ys.reduce((s,y)=>s+(y-my)**2,0));
    return {r:den?+(num/den).toFixed(2):0,n:pts.length};
  }

  const rGlobal = pearsonPares(ejeX,ejeY);
  const rReg = Object.keys(REG).map(reg=>({reg,...pearsonPares(ejeX,ejeY,reg)}));

  function rColor(r){if(!r)return S.muted;const a=Math.abs(r);return a>0.6?S.green:a>0.4?S.amber:S.red;}

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:700,
          messages:[{role:"user",content:prompt}]})});
      const d = await res.json();
      setAiTxt(d.content?.find(b=>b.type==="text")?.text||"Error.");
    } catch(e){setAiTxt("Error de conexión.");}
    setLoading(false);

        <KpiCard icon="⚖" label="Kg DQO/día" value={avgF(kg_vals)||"—"} unit="kg" color={S.slate}/>
        <KpiCard icon="🫧" label="Días espumas" value={esp_days} unit={`de ${lab.length}`} color={S.purple}/>
        <KpiCard icon="⚗" label="SSV medio" value={avgF(ssv_vals)||"—"} unit="mg/l" color={S.cyan}/>

      </div>

      <div style={{display:"flex",gap:2,marginBottom:14,borderBottom:`2px solid ${S.border}`}}>
        {SUBS.map(t=>(
          <button key={t.id} onClick={()=>setSub(t.id)} style={{background:"none",border:"none",
            borderBottom:`2.5px solid ${sub===t.id?S.green:"transparent"}`,
            color:sub===t.id?S.green:S.muted,padding:"6px 14px",fontSize:11,fontWeight:700,
            cursor:"pointer",fontFamily:S.font,marginBottom:-2}}>{t.l}</button>
        ))}
      </div>

      {/* ── SEMÁFORO ── */}
      {sub==="semaforo" && (

              {RAW_PARES_CURVA.length ? (RAW_PARES_CURVA.reduce((s,r)=>s+r.diff_sour,0)/RAW_PARES_CURVA.length).toFixed(2) : "—"} mgO₂/gSSV·h</b> —
              los valores son comparables, pero el momento del ciclo varía. Esto confirma que
              <b> el laboratorio mide el estado endógeno del fango</b>, que el SN8 solo alcanza al final del ciclo.
            </div>
          </div>

          {/* Curvas individuales con punto de coincidencia */}
          <Card title="Curvas SN8 con punto de coincidencia con laboratorio"
            sub="Línea verde = curva SOUR del ciclo · punto rojo = valor más cercano al SOUR de lab · línea horizontal = SOUR lab">
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {RAW_PARES_CURVA.map((p,i) => {
                const W=220, H=130, PAD={t:10,r:8,b:24,l:32};
                const yMax = Math.max(...p.curva, p.sour_lab) * 1.2 || 1;
                const N = p.curva.length;
                const tx = idx => PAD.l + idx/(N-1) * (W-PAD.l-PAD.r);
                const ty = v  => H - PAD.b - (v/yMax) * (H-PAD.t-PAD.b);
                // índice del punto de coincidencia (pct_match → índice en curva normalizada)
                const matchIdx = Math.round(p.pct_match/100 * (N-1));
                // path de la curva
                const pts = p.curva.map((s,j) => `${j===0?'M':'L'}${tx(j).toFixed(1)},${ty(s).toFixed(1)}`).join(' ');
                return (
                  <div key={i} style={{background:S.panel,border:`1px solid ${S.border}`,
                    borderRadius:10,padding:"10px 8px",fontFamily:S.font}}>
                    <div style={{fontSize:10,fontWeight:800,color:S.slate,marginBottom:2}}>
                      {p.f}
                      <span style={{fontSize:9,color:S.muted,fontWeight:400,marginLeft:6}}>
                        {p.ini}→{p.fin}
                      </span>
                    </div>
                    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
                      {/* Grid */}
                      {[0,0.5,1].map(t=>(
                        <line key={t} x1={PAD.l} x2={W-PAD.r}
                          y1={H-PAD.b-t*(H-PAD.t-PAD.b)} y2={H-PAD.b-t*(H-PAD.t-PAD.b)}
                          stroke={S.gridLine} strokeWidth={1}/>
                      ))}
                      {/* Línea horizontal = SOUR lab */}
                      <line x1={PAD.l} x2={W-PAD.r} y1={ty(p.sour_lab)} y2={ty(p.sour_lab)}
                        stroke={S.purple} strokeWidth={1.5} strokeDasharray="4 2"/>
                      <text x={W-PAD.r+2} y={ty(p.sour_lab)+4} fontSize={8} fill={S.purple}>
                        {p.sour_lab}
                      </text>
                      {/* Curva SN8 */}
                      <path d={pts} fill="none" stroke={S.green} strokeWidth={2}/>
                      {/* Punto de coincidencia */}
                      <circle cx={tx(matchIdx)} cy={ty(p.curva[matchIdx])} r={5}
                        fill={p.diff_sour<1?S.green:p.diff_sour<2?S.amber:S.red}
                        stroke="#fff" strokeWidth={2}/>
                      {/* Eje Y labels */}
                      <text x={PAD.l-2} y={ty(yMax)+4} fontSize={7} fill={S.mutedLight} textAnchor="end">
                        {yMax.toFixed(1)}</text>
                      <text x={PAD.l-2} y={H-PAD.b+4} fontSize={7} fill={S.mutedLight} textAnchor="end">0</text>
                      {/* Info */}
                      <text x={PAD.l} y={H-4} fontSize={8} fill={S.muted}>
                        {p.hora_match} · Δ={p.diff_sour}
                      </text>
                    </svg>
                    <div style={{display:"flex",gap:6,marginTop:4,fontSize:9}}>
                      <span style={{color:S.purple}}>● lab={p.sour_lab}</span>
                      <span style={{color:S.green}}>● pk={p.sour_pk}</span>
                      <span style={{color:p.diff_sour<1?S.green:p.diff_sour<2?S.amber:S.red,fontWeight:700}}>
                        Δ={p.diff_sour}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>

          {/* Serie temporal */}
          <Card title="Serie temporal: SOUR laboratorio vs SN8 final"
            sub="Barras moradas = SOUR lab (227 días) · Puntos verdes = SOUR SN8 final (38 días)">
            <ResponsiveContainer width="100%" height={230}>
              <ComposedChart data={RAW_SERIE_RESP} margin={{top:4,right:40,left:0,bottom:20}}>
                <CartesianGrid strokeDasharray="3 3" stroke={S.gridLine}/>
                <XAxis dataKey="f" tick={{fontSize:8,fill:S.mutedLight}} interval={15}
                  tickFormatter={v=>v.slice(2,7)}/>
                <YAxis yAxisId="l" tick={{fontSize:9,fill:S.mutedLight}}/>
                <YAxis yAxisId="r" orientation="right" tick={{fontSize:9,fill:S.mutedLight}}/>
                <Tooltip content={<CT/>}/>
                <Bar yAxisId="l" dataKey="sour_lab" fill={S.purple} fillOpacity={0.6}
                  name="SOUR lab" radius={[2,2,0,0]}/>
                <Line yAxisId="r" type="monotone" dataKey="sour_sn8_fl" stroke={S.green}
                  strokeWidth={2} dot={{r:5,fill:S.green}} connectNulls={false} name="SOUR SN8 final"/>
                <Legend wrapperStyle={{fontSize:10,fontFamily:S.font}}/>
              </ComposedChart>
            </ResponsiveContainer>
          </Card>
        </div>
      )}

      {sub==="tabla" && (
        <Card title="Datos diarios — últimos 30 registros con datos">
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:S.font}}>
              <thead>
                <tr style={{background:S.bg}}>
                  {["Fecha","HCT SBR","NH₄ SBR","Kg DQO","SST","SSV","F/M","Espumas"].map(h=>(
                    <th key={h} style={{padding:"6px 8px",textAlign:"left",color:S.muted,
                      fontWeight:700,fontSize:10,borderBottom:`1px solid ${S.border}`,whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {lab.filter(r=>r.hct_sbr||r.kg_dqo).slice(0,30).map((r,i)=>{
                  const ha=r.hct_sbr&&r.hct_sbr>100;
                  return (
                    <tr key={i} style={{background:ha?S.redFade:i%2===0?"#fff":S.bg,
                      borderBottom:`1px solid ${S.border}`}}>
                      <td style={{padding:"5px 8px",fontWeight:600}}>{r.f}</td>
                      <td style={{padding:"5px 8px",fontWeight:ha?700:400,
                        color:ha?S.red:r.hct_sbr>60?S.amber:S.green}}>
                        {r.hct_sbr?.toFixed(1)||"—"}</td>
                      <td style={{padding:"5px 8px",color:r.nh4_sbr>100?S.red:S.slate}}>
                        {r.nh4_sbr?.toFixed(1)||"—"}</td>
                      <td style={{padding:"5px 8px"}}>{r.kg_dqo?.toFixed(0)||"—"}</td>
                      <td style={{padding:"5px 8px"}}>{r.sst_sbr?.toLocaleString()||"—"}</td>
                      <td style={{padding:"5px 8px",color:S.cyan}}>{r.ssv_sbr?.toLocaleString()||"—"}</td>
                      <td style={{padding:"5px 8px"}}>{r.fm?.toFixed(3)||"—"}</td>
                      <td style={{padding:"5px 8px",color:r.espumas?S.purple:S.mutedLight}}>
                        {r.espumas===1?"⚠ Sí":"No"}</td>

  );
}



// ── Tab Evolución SN8 ─────────────────────────────────────────────
function TabEvolucion({ procs }) {
  const val = procs.filter(p => p.valido);
  const [hover, setHover] = useState(null);

  // Serie cronológica de todos los ciclos válidos
  const serie = val.map(p => ({
    f:    p.raw.f,
    ini:  p.raw.ini,
    pk:   p.peakVal,
    fl:   p.raw.fl,
    sh:   p.raw.sh || 0,
    ssv:  p.raw.ssv || 0,
    bp:   p.raw.bp || 0,
    tipo: p.tipo,
  })).sort((a,b) => a.ini.localeCompare(b.ini));

  // Medias móviles (ventana 5 ciclos)
  const W = 5;
  const serieMA = serie.map((s,i) => {
    const win = serie.slice(Math.max(0,i-W+1), i+1);
    return {
      ...s,
      pk_ma: +(win.reduce((a,b)=>a+b.pk,0)/win.length).toFixed(2),
      fl_ma: +(win.reduce((a,b)=>a+b.fl,0)/win.length).toFixed(2),
    };
  });

  // Agrupar por mes para barras de sobreaireo
  const byMes = {};
  serie.forEach(s => {
    const m = s.f.slice(0,7);
    if (!byMes[m]) byMes[m] = {mes: m.slice(5), sh:0, n:0, pk:[], fl:[]};
    byMes[m].sh += s.sh;
    byMes[m].n++;
    byMes[m].pk.push(s.pk);
    byMes[m].fl.push(s.fl);
  });
  const mesArr = Object.values(byMes).sort((a,b)=>a.mes.localeCompare(b.mes)).map(m=>({
    mes: m.mes,
    sh:  +m.sh.toFixed(1),
    n:   m.n,
    pk:  +(m.pk.reduce((a,b)=>a+b,0)/m.pk.length).toFixed(1),
    fl:  +(m.fl.reduce((a,b)=>a+b,0)/m.fl.length).toFixed(1),
    eur: +(m.sh * 45 * 0.12).toFixed(0),
  }));

  // Distribución de tipos
  const tipos = {};
  serie.forEach(s => { tipos[s.tipo] = (tipos[s.tipo]||0)+1; });
  const tipoArr = Object.entries(tipos).map(([t,n])=>({
    tipo: t, n,
    label: TM[t]?.label || t,
    color: TM[t]?.color || S.muted,
  })).sort((a,b)=>b.n-a.n);

  // KPIs
  const sourPkMed = +(serie.reduce((a,s)=>a+s.pk,0)/serie.length).toFixed(1);
  const sourFlMed = +(serie.reduce((a,s)=>a+s.fl,0)/serie.length).toFixed(1);
  const shTotal   = +serie.reduce((a,s)=>a+s.sh,0).toFixed(1);
  const eurTotal  = +(shTotal * 45 * 0.12).toFixed(0);

  // Scatter: índice del ciclo en el tiempo vs SOUR pico — ¿hay tendencia?
  const scatterIdx = serieMA.map((s,i)=>({...s, idx: i+1}));

  // Pearson simple para tendencia
  const n = scatterIdx.length;
  const xs = scatterIdx.map((_,i)=>i+1);
  const ys = scatterIdx.map(s=>s.pk);
  const mx = xs.reduce((a,b)=>a+b)/n, my = ys.reduce((a,b)=>a+b)/n;
  const num = xs.reduce((s,x,i)=>s+(x-mx)*(ys[i]-my),0);
  const den = Math.sqrt(xs.reduce((s,x)=>s+(x-mx)**2,0)*ys.reduce((s,y)=>s+(y-my)**2,0));
  const rTrend = den ? +(num/den).toFixed(2) : 0;
  const slope  = den ? +(num / xs.reduce((s,x)=>s+(x-mx)**2,0)).toFixed(3) : 0;
  const trendLabel = Math.abs(rTrend) < 0.15 ? "Estable" : rTrend > 0 ? "↑ Tendencia creciente" : "↓ Tendencia decreciente";

  return (
    <div>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:16}}>
        <KpiCard icon="📈" label="SOUR pico medio" value={sourPkMed} unit="mgO₂/gSSV·h" color={S.green}/>
        <KpiCard icon="📉" label="SOUR final medio" value={sourFlMed} unit="mgO₂/gSSV·h" color={S.cyan}/>
        <KpiCard icon="⏱" label="Sobreaireo total" value={shTotal} unit="horas detectadas" color={S.amber}/>
        <KpiCard icon="💶" label="Coste sobreaireo" value={`${eurTotal}€`} unit="en ciclos analizados" color={S.red}/>
        <KpiCard icon="🔄" label="Ciclos analizados" value={serie.length} unit={`en ${Object.keys(byMes).length} meses`} color={S.slate}/>
      </div>

      {/* Evolución SOUR pico + final en el tiempo */}
      <Card title="Evolución SOUR pico y final — todos los ciclos cronológicos"
        sub="Línea verde = SOUR pico · línea cyan = SOUR final · media móvil 5 ciclos">
        <ResponsiveContainer width="100%" height={240}>
          <ComposedChart data={serieMA} margin={{top:4,right:20,left:0,bottom:20}}>
            <CartesianGrid strokeDasharray="3 3" stroke={S.gridLine}/>
            <XAxis dataKey="f" tick={{fontSize:8,fill:S.mutedLight}} interval={8}
              tickFormatter={v=>v.slice(5)}/>
            <YAxis tick={{fontSize:9,fill:S.mutedLight}}
              label={{value:"mgO₂/gSSV·h",angle:-90,position:"insideLeft",
                fill:S.mutedLight,fontSize:8,dy:40}}/>
            <Tooltip content={<CT/>}/>
            <ReferenceLine y={sourPkMed} stroke={S.green} strokeDasharray="3 2" strokeOpacity={0.4}/>
            <ReferenceLine y={sourFlMed} stroke={S.cyan}  strokeDasharray="3 2" strokeOpacity={0.4}/>
            {/* Puntos individuales atenuados */}
            <Line type="linear" dataKey="pk" stroke={S.green} strokeWidth={0}
              dot={(props)=>{
                const {cx,cy,payload,index} = props;
                const isH = hover===index;
                return <circle key={index} cx={cx} cy={cy} r={isH?6:3}
                  fill={S.green} fillOpacity={0.35} stroke="none"
                  onMouseEnter={()=>setHover(index)} onMouseLeave={()=>setHover(null)}/>;
              }} name="SOUR pico"/>
            <Line type="linear" dataKey="fl" stroke={S.cyan} strokeWidth={0}
              dot={(props)=>{
                const {cx,cy,index} = props;
                return <circle key={index} cx={cx} cy={cy} r={2.5}
                  fill={S.cyan} fillOpacity={0.3} stroke="none"/>;
              }} name="SOUR final"/>
            {/* Media móvil encima */}
            <Line type="monotone" dataKey="pk_ma" stroke={S.green} strokeWidth={2.5}
              dot={false} name="SOUR pico (MM5)"/>
            <Line type="monotone" dataKey="fl_ma" stroke={S.cyan} strokeWidth={2}
              dot={false} name="SOUR final (MM5)"/>
            <Legend wrapperStyle={{fontSize:10,fontFamily:S.font}}/>
          </ComposedChart>
        </ResponsiveContainer>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        {/* Sobreaireo mensual */}
        <Card title="Sobreaireo mensual" sub="horas · coste estimado a 45kW · 0,12€/kWh">
          <ResponsiveContainer width="100%" height={200}>
            <ComposedChart data={mesArr} margin={{top:4,right:30,left:0,bottom:20}}>
              <CartesianGrid strokeDasharray="3 3" stroke={S.gridLine}/>
              <XAxis dataKey="mes" tick={{fontSize:9,fill:S.mutedLight}}/>
              <YAxis yAxisId="l" tick={{fontSize:9,fill:S.mutedLight}}/>
              <YAxis yAxisId="r" orientation="right" tick={{fontSize:9,fill:S.mutedLight}}/>
              <Tooltip content={<CT/>}/>
              <Bar yAxisId="l" dataKey="sh" fill={S.amber} fillOpacity={0.8}
                name="h sobreaireo" radius={[3,3,0,0]}/>
              <Line yAxisId="r" type="monotone" dataKey="eur" stroke={S.red}
                strokeWidth={2} dot={{r:3,fill:S.red}} name="€ sobreaireo"/>
            </ComposedChart>
          </ResponsiveContainer>
        </Card>

        {/* Distribución de tipos */}
        <Card title="Distribución por tipo de ciclo" sub="clasificación automática por perfil SOUR">
          <div style={{display:"flex",flexDirection:"column",gap:8,padding:"8px 0"}}>
            {tipoArr.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:11,color:t.color,fontWeight:700,minWidth:16}}>
                  {TM[t.tipo]?.icon||"●"}
                </span>
                <span style={{fontSize:11,color:S.slate,minWidth:120}}>{t.label}</span>
                <div style={{flex:1,background:S.border,borderRadius:20,height:8,overflow:"hidden"}}>
                  <div style={{width:`${t.n/serie.length*100}%`,background:t.color,
                    height:"100%",borderRadius:20}}/>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:t.color,minWidth:30,textAlign:"right"}}>
                  {t.n}
                </span>
                <span style={{fontSize:10,color:S.mutedLight}}>
                  {Math.round(t.n/serie.length*100)}%
                </span>
              </div>
            ))}
          </div>
          <div style={{marginTop:12,padding:"10px 14px",background:S.bg,borderRadius:8,
            fontSize:11,color:S.muted}}>
            <b style={{color:S.slate}}>Tendencia SOUR pico:</b>{" "}
            <span style={{color:Math.abs(rTrend)<0.15?S.green:rTrend>0?S.red:S.amber,fontWeight:700}}>
              {trendLabel}
            </span>
            {" "}(r={rTrend}, slope={slope} mgO₂·ciclo⁻¹)
          </div>
        </Card>
      </div>

      {/* SOUR pico vs final — scatter para ver si los ciclos terminan en endógena */}
      <Card title="SOUR pico vs SOUR final — ¿terminan los ciclos en endógena?"
        sub="Punto sobre la diagonal = ciclo terminó activo (sobreaireo). Punto cerca del eje X = endógena real.">
        {(() => {
          const W2=560,H2=260,P={t:16,r:20,b:40,l:48};
          const xMax = Math.max(...serie.map(s=>s.pk))*1.1||1;
          const yMax = xMax;
          const tx = v => P.l + v/xMax*(W2-P.l-P.r);
          const ty = v => H2-P.b - v/yMax*(H2-P.t-P.b);
          return (
            <svg width="100%" viewBox={`0 0 ${W2} ${H2}`} style={{overflow:"visible"}}>
              {[0,0.25,0.5,0.75,1].map(t=>(
                <line key={t} x1={P.l} x2={W2-P.r}
                  y1={H2-P.b-t*(H2-P.t-P.b)} y2={H2-P.b-t*(H2-P.t-P.b)}
                  stroke={S.gridLine} strokeWidth={1}/>
              ))}
              {/* Diagonal y=x */}
              <line x1={tx(0)} y1={ty(0)} x2={tx(xMax)} y2={ty(xMax)}
                stroke={S.mutedLight} strokeWidth={1} strokeDasharray="4 3"/>
              <text x={tx(xMax)-4} y={ty(xMax)-4} fontSize={8} fill={S.mutedLight}>y=x</text>
              {/* Zona endógena (fl < 3) */}
              <rect x={P.l} y={H2-P.b-3/yMax*(H2-P.t-P.b)}
                width={W2-P.l-P.r} height={3/yMax*(H2-P.t-P.b)}
                fill={S.green} fillOpacity={0.07}/>
              <text x={W2-P.r} y={H2-P.b-3/yMax*(H2-P.t-P.b)-3}
                fontSize={8} fill={S.green} textAnchor="end">zona endógena</text>
              {/* Puntos */}
              {serie.map((s,i)=>{
                const col = TM[s.tipo]?.color || S.muted;
                const isH = hover===i;
                return (
                  <g key={i} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}
                    style={{cursor:"pointer"}}>
                    <circle cx={tx(s.pk)} cy={ty(s.fl)} r={isH?8:5}
                      fill={col} fillOpacity={0.75} stroke={isH?"#fff":"none"} strokeWidth={2}/>
                    {isH&&(
                      <text x={tx(s.pk)+9} y={ty(s.fl)-6} fontSize={9} fill={S.slate}>
                        {s.f} pk={s.pk} fl={s.fl}
                      </text>
                    )}
                  </g>
                );
              })}
              <text x={W2/2} y={H2-4} fontSize={10} fill={S.muted} textAnchor="middle">
                SOUR pico</text>
              <text x={14} y={H2/2} fontSize={10} fill={S.muted} textAnchor="middle"
                transform={`rotate(-90,14,${H2/2})`}>SOUR final</text>
            </svg>
          );
        })()}
        <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}}>
          {tipoArr.map((t,i)=>(
            <span key={i} style={{fontSize:10,color:t.color}}>
              {TM[t.tipo]?.icon} {t.label} ({t.n})
            </span>
          ))}
        </div>
      </Card>
    </div>
  );
}


// ── App ───────────────────────────────────────────────────────────
function SicairSBR() {
  useMemo(() => {
    if (!document.querySelector("#sensara-font")) {
      const l = document.createElement("link");
      l.id = "sensara-font"; l.rel = "stylesheet";
      l.href = "https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap";
      document.head.appendChild(l);
    }
  }, []);

  const [tab, setTab]           = useState("ejecutivo");
  const [ciclosData, setCiclos] = useState(RAW_CICLOS);
  const [fetching, setFetching] = useState(true);
  const [lastUpdate, setLastUpdate] = useState(null);

  // Carga datos frescos de GitHub al arrancar y cada 30 minutos
  React.useEffect(() => {
    async function cargar() {
      try {
        const res = await fetch("https://raw.githubusercontent.com/jmochoa74/sicair-getafe/main/datos_sn8_getafe.json?t=" + Date.now());
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (data.ciclos && data.ciclos.length > 0) {
          setCiclos(data.ciclos.filter(c => c.v === 1));
          setLastUpdate(data.generado?.slice(0,16).replace("T"," ") || null);
        }
      } catch(e) {
        console.warn("GitHub fetch error:", e.message, "— usando datos locales");
      } finally {
        setFetching(false);
      }
    }
    cargar();
    const interval = setInterval(cargar, 30 * 60 * 1000); // cada 30 min
    return () => clearInterval(interval);
  }, []);

  const todosProcs = useMemo(() => ciclosData.map(c => processCiclo(c)), [ciclosData]);
  const procsVal = todosProcs.filter(p => p.valido);
  const sob = procsVal.reduce((s,p) => s+p.sobH, 0);
  const sourMed = procsVal.length ? +(procsVal.reduce((s,p) => s+p.peakVal,0)/procsVal.length).toFixed(1) : 0;

  const TABS = [
    {id:"ejecutivo",  l:"Resumen ejecutivo"},
    {id:"ciclos",     l:"Ciclos SN8"},
    {id:"laboratorio",l:"Laboratorio"},
    {id:"evolucion",   l:"📈 Evolución"},
  ];

  return (
    <div style={{minHeight:"100vh",background:S.bg,fontFamily:S.font,color:S.slate}}>
      <header style={{background:"#fff",borderBottom:`1px solid ${S.border}`,padding:"0 32px",height:60,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(30,45,61,0.07)"}}>
        <Logo size={28}/>
        <nav style={{display:"flex",gap:2}}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{background:"none",border:"none",borderBottom:`2.5px solid ${tab===t.id?S.green:"transparent"}`,color:tab===t.id?S.green:S.muted,padding:"0 14px",height:60,fontSize:12,fontWeight:700,cursor:"pointer",transition:"all .15s",fontFamily:S.font}}>
              {t.l}
            </button>
          ))}
        </nav>
        <div style={{display:"flex",gap:8}}>
          <Pill color={fetching?S.amber:S.green} fade={S.greenFade} border={S.greenBorder}>
            {fetching ? "⟳ Cargando..." : `${ciclosData.length} ciclos`}
          </Pill>
          {lastUpdate && <Pill color={S.slate} fade={S.bg} border={S.border}>🕐 {lastUpdate}</Pill>}
          <Pill color={S.red} fade={S.redFade} border={S.redBorder}>⚡ {sob.toFixed(0)}h sobreaireo</Pill>
        </div>
      </header>
      <main style={{maxWidth:1300,margin:"0 auto",padding:"24px 32px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:24}}>
          <KpiCard icon="📊" label="Ciclos válidos" value={procsVal.length} unit={`de ${todosProcs.length} totales`} color={S.blue}/>
          <KpiCard icon="⏱" label="Sobreaireo" value={`${sob.toFixed(0)}h`} unit="total detectado" color={S.amber} sub={`~${Math.round(sob*15)} kWh · ~${Math.round(sob*15*0.12)}€`}/>
          <KpiCard icon="📈" label="SOUR pico medio" value={sourMed} unit="mgO₂/gSSV·h" color={S.green}/>
          <KpiCard icon="🔬" label="Doble plateau" value={procsVal.filter(p => p.tipo==="doble").length} unit="ss+xs identificados" color={S.cyan}/>
          <KpiCard icon="🧪" label="Registros lab" value={RAW_LAB.length} unit={`${RAW_LAB.filter(r => r.dqo_h && r.dqo_v).length} con DQO completa`} color={S.purple}/>
        </div>
        {tab === "ejecutivo"   && <TabEjecutivo  procs={todosProcs}/>}
        {tab === "ciclos"      && <TabCiclos      procs={todosProcs}/>}
        {tab === "laboratorio" && <TabLaboratorio procs={todosProcs}/>}
        {tab === "evolucion"   && <TabEvolucion   procs={todosProcs}/>}
        <footer style={{marginTop:32,paddingTop:20,borderTop:`1px solid ${S.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <Logo size={20}/>
          <div style={{fontSize:10,color:S.mutedLight}}>sensaratech.com · Logroño, La Rioja · SICAIR SBR 2.0</div>
          <Pill color={S.green} fade={S.greenFade} border={S.greenBorder}>{ciclosData[0]?.f} → {ciclosData.at(-1)?.f}</Pill>
        </footer>
      </main>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SicairSBR/>);
  </script>
</body>
</html>
